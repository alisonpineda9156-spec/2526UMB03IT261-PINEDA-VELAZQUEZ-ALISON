<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container" ng-app="app" ng-controller="Index">
        <div class="card card-custom shadow-sm">
    <div class="card-body">

      <div class="title-line">
        <h5 class="fw-bold mb-2">Rutas</h5>
      </div>

      <form>
        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label">Fecha de inicio</label>
            <input type="date" ng-model="formrutas.fechadeinicio" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">
              Fecha de conclusión <span class="text-danger"></span>
            </label>
            <input type="date" ng-model="formrutas.fechadefin" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Proveedor</label>
            <select class="form-select" ng-model="formrutas.proveedor">
              <option selected disabled>Seleccione un proveedor</option>
              <option>Salchichas</option>
              <option>Salchichones</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Auto</label>
            <select class="form-select" ng-model="formrutas.auto">
              <option selected disabled>Seleccione un auto</option>
              <option>El de el profe </option>
              <option>El de Cris</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Driver</label>
            <select class="form-select" ng-model="formrutas.driver">
              <option selected disabled>Seleccione un driver</option>
              <option>Driver</option>
              <option>Driver</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Id ruta</label>
            <input type="text" class="form-control" placeholder="Id ruta" ng-model="formrutas.idruta">
          </div>

        </div>

        <div class="row mt-4">
          <div class="col-md-4">
            <button type="submit" class="btn btn-success w-100">
              Buscar
            </button>
          </div>

          <div class="col-md-4">
            <button type="button" class="btn btn-primary w-100" ng-click="guardarRuta()">
              Nueva ruta
            </button>
          </div>
        </div>

      </form>

    </div>
  </div>
        <div class="row">
            <div class="col-md-3">
                <p>{{mensaje1}}</p>
            </div>
            <div class="col-md-3">
                <input type="text" ng-model="mensaje1">
            </div>
            <div class="col-md-8">
                <input type="text" ng-model="mensaje2">

                <button class="btn btn-primary" ng-click="guardarRuta()">Cambiar mensaje</button>
            </div>
            <div class="col-md-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="JS/Libr/angular.min.js"> </script>

    <script src="JS/modulos/app.module.js"></script>

    <script src="JS/controladores/index.controller.js"></script>
</body>

</html>
