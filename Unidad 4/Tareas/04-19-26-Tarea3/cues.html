<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pag</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light p-4">

<div class="container">

  <div class="card card-custom shadow-sm">
    <div class="card-body">

      <div class="title-line">
        <h5 class="fw-bold mb-2">Rutas</h5>
      </div>

      <form>
        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label">Fecha de inicio</label>
            <input type="date" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">
              Fecha de conclusión <span class="text-danger"></span>
            </label>
            <input type="date" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Proveedor</label>
            <select class="form-select">
              <option selected disabled>Seleccione un proveedor</option>
              <option>Salchichas</option>
              <option>Salchichones</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Auto</label>
            <select class="form-select">
              <option selected disabled>Seleccione un auto</option>
              <option>El de el profe </option>
              <option>El de Cris</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Driver</label>
            <select class="form-select">
              <option selected disabled>Seleccione un driver</option>
              <option>Driver</option>
              <option>Driver</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Id ruta</label>
            <input type="text" class="form-control" placeholder="Id ruta">
          </div>

        </div>

        <div class="row mt-4">
          <div class="col-md-4">
            <button type="submit" class="btn btn-success w-100">
              Buscar
            </button>
          </div>

          <div class="col-md-4">
            <button type="button" class="btn btn-primary w-100">
              Nueva ruta
            </button>
          </div>
        </div>

      </form>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
