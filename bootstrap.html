<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Mi App Bootstrap</span>
        </div>
    </nav>

    <div class="container">
        
        <div class="alert alert-success">
            ¡Entorno configurado con éxito! Parte 6.3: Sé feliz 😊
        </div>

        <div class="row mb-4">
            <div class="col-md-6 border bg-light p-3">Columna 1 (Responsiva md-6)</div>
            <div class="col-md-6 border bg-light p-3">Columna 2 (Responsiva md-6)</div>
        </div>

        <div class="row mb-4">
            <div class="col border p-3">1 de 3</div>
            <div class="col border p-3">2 de 3</div>
            <div class="col border p-3">3 de 3</div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Imagen">
                    <div class="card-body">
                        <h5 class="card-title">Título de Tarjeta</h5>
                        <p class="card-text">Ejemplo de texto dentro de una card de Bootstrap.</p>
                        <a href="#" class="btn btn-primary">Ir a algún lugar</a>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <form class="p-4 border rounded">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="nombre@ejemplo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Enviar Formulario</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
